name: Build credentials data

on:
  push:
    paths:
      - "**/translations/**"
      - "**/input-fields/**"
      - "**/credential-types.json"
      - "**/user-consent/user-consent-map.json"
      - "**/user-consent/consent-groups.json"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run script
        run: node .github/scripts/build-credential-data.js

      - name: Commit generated credentials file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add _autogen/credentials.json

          # only proceed if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi


          git commit -m "Auto update credentials data"
          git push